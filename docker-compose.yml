services:
  # CLI inference (one-shot)
  inference:
    build: .
    image: quant.cpp:latest
    volumes:
      - ./models:/models
    command:
      - /models/model.gguf
      - -k
      - uniform_4b
      - -v
      - q4
      - -j
      - "4"
      - -p
      - "Hello, world"

  # OpenAI-compatible server (persistent)
  server:
    build: .
    image: quant.cpp:latest
    entrypoint: ["quant-server"]
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    command:
      - /models/model.gguf
      - -p
      - "8080"
      - -k
      - uniform_4b
      - -j
      - "4"
    restart: unless-stopped
